# =============================================================================
# DPDP + AI Compliance OS — Days 2-8  (YAML-valid, Windows-compatible)
# Usage:
#   docker compose -f docker-compose.day1.yml -f docker-compose.day2-8.yml `
#     --profile day2 up -d
# =============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - compliance-net
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-env-defaults: &env-defaults
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  DB_HOST: postgres
  REDIS_HOST: redis
  KAFKA_BOOTSTRAP: kafka:9092
  NEO4J_URI: bolt://neo4j:7687
  TEMPORAL_HOST: temporal:7233
  S3_ENDPOINT: minio:9000

x-hc-fast: &hc-fast
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 30s

services:

  # ===========================================================================
  # DAY 2
  # ===========================================================================

  sdf-determinator:
    <<: *service-defaults
    profiles: [day2, all]
    build:
      context: ./services/day2/sdf-determinator
      dockerfile: Dockerfile
    image: compliance-day2/sdf-determinator:1.0
    depends_on:
      postgres: { condition: service_started }
      redis:    { condition: service_started }
    environment:
      <<: *env-defaults
      OTEL_SERVICE_NAME: sdf-determinator
    ports:
      - "8101:8101"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  dpia-engine:
    <<: *service-defaults
    profiles: [day2, all]
    build:
      context: ./services/day2/dpia-engine
      dockerfile: Dockerfile
